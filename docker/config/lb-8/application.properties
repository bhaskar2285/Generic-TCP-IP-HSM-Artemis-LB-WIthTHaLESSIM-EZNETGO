server.port=8117
spring.threads.virtual.enabled=true

spring.activemq.broker-url=failover:(tcp://artemis-slave:61616,tcp://artemis-master:61616)?jms.prefetchPolicy.queuePrefetch=3&initialReconnectDelay=100&maxReconnectDelay=10000&maxReconnectAttempts=-1&randomize=false
spring.activemq.user=
spring.activemq.password=
spring.jms.pub-sub-domain=false

hsm.lb.queue.inbound=hsm.transparent.lb.in
hsm.lb.queue.control=hsm.transparent.lb.control
hsm.lb.queue.reply=hsm.transparent.lb.reply

hsm.lb.jms.concurrent-consumers=400
hsm.lb.jms.max-concurrent-consumers=600
hsm.lb.jms.per-node-capacity=400
hsm.lb.jms.virtual-threads=false

hsm.lb.algorithm=ROUND_ROBIN

hsm.lb.health.interval-ms=10000
hsm.lb.health.command-hex=0008303030304e4f3030

hsm.lb.pool.max-total=20
hsm.lb.pool.min-idle=2
hsm.lb.pool.max-wait-ms=10000
hsm.lb.pool.socket-timeout-ms=10000
hsm.lb.pool.connect-timeout-ms=2000

hsm.lb.circuit-breaker.enabled=false
hsm.lb.retry.max-attempts=1
hsm.lb.request.max-age-ms=10000

hsm.lb.nodes=node1:hsm-sim-1:9000:1,node2:hsm-sim-2:9000:1

hsm.lb.instance-id=lb-8
hsm.lb.payload.log-enabled=false

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

logging.level.com.isc.hsm.transparentlb=INFO
logging.level.org.springframework=WARN
logging.level.org.apache.activemq=WARN
logging.file.name=/logs/thales-lb8-app.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB
