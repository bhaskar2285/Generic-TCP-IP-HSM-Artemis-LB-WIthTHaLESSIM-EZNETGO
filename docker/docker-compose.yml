networks:
  hsm-net:
    driver: bridge

volumes:
  artemis-data-1:      # broker-1 (artemis-master)
  artemis-data-2:      # broker-2 (artemis-slave)
  artemis-data-3:      # broker-3 (artemis-node3)
  artemis-data-4:      # broker-4 (artemis-node4)

services:

  # ── Artemis Master ────────────────────────────────────────────────────────
  # Instance created at /var/lib/ by docker-run.sh on first boot.
  # etc-override/ files are copied into etc/ after instance creation.
  artemis-master:
    image: apache/activemq-artemis:2.38.0
    container_name: artemis-master
    hostname: artemis-master
    networks: [hsm-net]
    ports:
      - "61626:61616"
      - "61628:61618"
      - "18163:8161"
      - "9404:9404"
    user: root
    volumes:
      - artemis-data-1:/var/lib/artemis-instance/data
      - ./artemis/broker-master.xml:/var/lib/artemis-instance/etc-override/broker.xml:ro
      - ./jmx-exporter/jmx_prometheus_javaagent-1.0.1.jar:/jmx/jmx_prometheus_javaagent.jar:ro
      - ./prometheus/jmx-artemis.yml:/jmx/config.yml:ro
    environment:
      ARTEMIS_USER: artemis
      ARTEMIS_PASSWORD: artemis
      ANONYMOUS_LOGIN: "true"
      JAVA_ARGS: "-Xms3g -Xmx3g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -javaagent:/jmx/jmx_prometheus_javaagent.jar=9404:/jmx/config.yml"
    mem_limit: 4000m
    memswap_limit: 4000m
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'F0B0' /proc/net/tcp6 2>/dev/null || grep -q 'F0B0' /proc/net/tcp 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # ── Artemis Slave (backup) ────────────────────────────────────────────────
  # Blocks on shared journal lock. Promotes automatically when master dies.
  artemis-slave:
    image: apache/activemq-artemis:2.38.0
    container_name: artemis-slave
    hostname: artemis-slave
    networks: [hsm-net]
    ports:
      - "61627:61616"
      - "61629:61618"
      - "18164:8161"
      - "9405:9405"
    user: root
    volumes:
      - artemis-data-2:/var/lib/artemis-instance/data
      - ./artemis/broker-slave.xml:/var/lib/artemis-instance/etc-override/broker.xml:ro
      - ./jmx-exporter/jmx_prometheus_javaagent-1.0.1.jar:/jmx/jmx_prometheus_javaagent.jar:ro
      - ./prometheus/jmx-artemis.yml:/jmx/config.yml:ro
    environment:
      ARTEMIS_USER: artemis
      ARTEMIS_PASSWORD: artemis
      ANONYMOUS_LOGIN: "true"
      JAVA_ARGS: "-Xms3g -Xmx3g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -javaagent:/jmx/jmx_prometheus_javaagent.jar=9405:/jmx/config.yml"
    mem_limit: 4000m
    memswap_limit: 4000m
    restart: unless-stopped

  # ── Artemis Node3 ────────────────────────────────────────────────────────
  artemis-node3:
    image: apache/activemq-artemis:2.38.0
    container_name: artemis-node3
    hostname: artemis-node3
    networks: [hsm-net]
    ports:
      - "61630:61616"
      - "61631:61618"
      - "18165:8161"
