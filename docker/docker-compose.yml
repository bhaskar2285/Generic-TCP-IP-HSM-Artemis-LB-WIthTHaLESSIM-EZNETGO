      JAVA_ARGS: "-Xms1g -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -javaagent:/jmx/jmx_prometheus_javaagent.jar=9407:/jmx/config.yml"
    mem_limit: 1500m
    memswap_limit: 1500m
    restart: unless-stopped

  # ── LB-1 ─────────────────────────────────────────────────────────────────
  lb-1:
    build:
      context: ./lb
      dockerfile: Dockerfile
    image: hsm-thales-lb:latest
    container_name: lb-1
    hostname: lb-1
    networks: [hsm-net]
    ports:
      - "8110:8110"
    volumes:
      - ./config/lb-1/application.properties:/config/application.properties:ro
      - ../logs/lb-1:/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      artemis-master:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grep -q '1FAE' /proc/net/tcp6 2>/dev/null || grep -q '1FAE' /proc/net/tcp 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── LB-2 ─────────────────────────────────────────────────────────────────
  lb-2:
