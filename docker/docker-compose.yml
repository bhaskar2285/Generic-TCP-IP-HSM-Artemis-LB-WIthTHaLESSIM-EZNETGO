  # ── Go HSM sim x5 (in-cluster, replaces .NET sims for benchmarking) ───────
  # Each listens on its own port (9000-9004) so they're individually addressable
  # both on the docker network (hsm-sim-N:900X) and on the host (19000-19004).
  hsm-sim-1:
      image: thales-go-sim:latest
      container_name: hsm-sim-1
      hostname: hsm-sim-1
      networks: [hsm-net]
      ports:
        - "19000:9000"
        - "9999:9999"
      command: ["-config", "ThalesParameters.xml", "-port", "9000", "-ui-port", "9999"]
      restart: unless-stopped

  hsm-sim-2:
      image: thales-go-sim:latest
      container_name: hsm-sim-2
      hostname: hsm-sim-2
      networks: [hsm-net]
      ports:
        - "19001:9000"
      command: ["-config", "ThalesParameters.xml", "-port", "9000"]
      restart: unless-stopped

  hsm-sim-3:
      image: thales-go-sim:latest
      container_name: hsm-sim-3
      hostname: hsm-sim-3
      networks: [hsm-net]
      ports:
        - "19002:9000"
      command: ["-config", "ThalesParameters.xml", "-port", "9000"]
      restart: unless-stopped

  hsm-sim-4:
      image: thales-go-sim:latest
      container_name: hsm-sim-4
      hostname: hsm-sim-4
      networks: [hsm-net]
      ports:
        - "19003:9000"
      command: ["-config", "ThalesParameters.xml", "-port", "9000"]
      restart: unless-stopped


  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    hostname: prometheus
    networks: [hsm-net]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    hostname: grafana
    networks: [hsm-net]
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/hsm-lb.json
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Docker Stats Exporter (replaces cAdvisor) ─────────────────────────────
  docker-stats-exporter:
    image: wywywywy/docker_stats_exporter:latest
    container_name: docker-stats-exporter
    hostname: docker-stats-exporter
    networks: [hsm-net]
    ports:
      - "9487:9487"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
