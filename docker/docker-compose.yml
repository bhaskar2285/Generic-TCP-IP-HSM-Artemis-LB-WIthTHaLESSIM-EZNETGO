networks:
  hsm-net:
    driver: bridge

volumes:
  artemis-data:        # shared journal — master holds file lock, slave waits
  lb1-logs:
  lb2-logs:
  eznet1-logs:
  eznet2-logs:

services:

  # ── Artemis Master ────────────────────────────────────────────────────────
  # Instance created at /var/lib/ by docker-run.sh on first boot.
  # etc-override/ files are copied into etc/ after instance creation.
  artemis-master:
    image: apache/activemq-artemis:2.38.0
    container_name: artemis-master
    hostname: artemis-master
    networks: [hsm-net]
    ports:
      - "61626:61616"
      - "18163:8161"
      - "9404:9404"
    user: root
    volumes:
      - artemis-data:/var/lib/artemis-instance/data
      - ./artemis/broker-master.xml:/var/lib/artemis-instance/etc-override/broker.xml:ro
      - ./jmx-exporter/jmx_prometheus_javaagent-1.0.1.jar:/jmx/jmx_prometheus_javaagent.jar:ro
      - ./prometheus/jmx-artemis.yml:/jmx/config.yml:ro
    environment:
      ARTEMIS_USER: artemis
      ARTEMIS_PASSWORD: artemis
      ANONYMOUS_LOGIN: "true"
      JAVA_ARGS: "-Xms1g -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -javaagent:/jmx/jmx_prometheus_javaagent.jar=9404:/jmx/config.yml"
    mem_limit: 1500m
    memswap_limit: 1500m
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'F0B0' /proc/net/tcp6 2>/dev/null || grep -q 'F0B0' /proc/net/tcp 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # ── Artemis Slave (backup) ────────────────────────────────────────────────
  # Blocks on shared journal lock. Promotes automatically when master dies.
  artemis-slave:
    image: apache/activemq-artemis:2.38.0
    container_name: artemis-slave
    hostname: artemis-slave
    networks: [hsm-net]
    ports:
      - "61627:61616"
      - "18164:8161"
      - "9405:9405"
    user: root
    volumes:
      - artemis-data:/var/lib/artemis-instance/data
      - ./artemis/broker-slave.xml:/var/lib/artemis-instance/etc-override/broker.xml:ro
      - ./jmx-exporter/jmx_prometheus_javaagent-1.0.1.jar:/jmx/jmx_prometheus_javaagent.jar:ro
      - ./prometheus/jmx-artemis.yml:/jmx/config.yml:ro
    environment:
      ARTEMIS_USER: artemis
      ARTEMIS_PASSWORD: artemis
      ANONYMOUS_LOGIN: "true"
      JAVA_ARGS: "-Xms1g -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -javaagent:/jmx/jmx_prometheus_javaagent.jar=9405:/jmx/config.yml"
    mem_limit: 1500m
    memswap_limit: 1500m
    depends_on:
      artemis-master:
        condition: service_healthy
    restart: unless-stopped

  # ── LB-1 ─────────────────────────────────────────────────────────────────
  lb-1:
    build:
      context: ./lb
      dockerfile: Dockerfile
    image: hsm-thales-lb:latest
    container_name: lb-1
    hostname: lb-1
    networks: [hsm-net]
    ports:
      - "8110:8110"
    volumes:
      - ./config/lb-1/application.properties:/config/application.properties:ro
      - lb1-logs:/var/log/xenticate
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      artemis-master:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grep -q '1FAE' /proc/net/tcp6 2>/dev/null || grep -q '1FAE' /proc/net/tcp 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── LB-2 ─────────────────────────────────────────────────────────────────
  lb-2:
    image: hsm-thales-lb:latest
    container_name: lb-2
    hostname: lb-2
    networks: [hsm-net]
    ports:
      - "8111:8111"
    volumes:
      - ./config/lb-2/application.properties:/config/application.properties:ro
      - lb2-logs:/var/log/xenticate
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      artemis-master:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grep -q '1FAF' /proc/net/tcp6 2>/dev/null || grep -q '1FAF' /proc/net/tcp 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── EZNet-1 ───────────────────────────────────────────────────────────────
  eznet-1:
    build:
      context: ./eznet
      dockerfile: Dockerfile
    image: hsm-eznet:latest
    container_name: eznet-1
    hostname: eznet-1
    networks: [hsm-net]
    ports:
      - "9105:9100"
      - "8120:8120"
    volumes:
      - ./config/eznet-1/application.properties:/eznet/config/application.properties:ro
      - eznet1-logs:/var/log/xenticate
    depends_on:
      artemis-master:
        condition: service_healthy
    restart: unless-stopped

  # ── EZNet-3 (added for horizontal scaling test) ──────────────────────────
  eznet-3:
    image: hsm-eznet:latest
    container_name: eznet-3
    hostname: eznet-3
    networks: [hsm-net]
    ports:
      - "9106:9100"
      - "8122:8122"
    volumes:
      - ./config/eznet-3/application.properties:/eznet/config/application.properties:ro
    depends_on:
      artemis-master:
        condition: service_healthy
    restart: unless-stopped

  # ── EZNet-4 (linear-scaling test) ────────────────────────────────────────
  eznet-4:
    image: hsm-eznet:latest
    container_name: eznet-4
    hostname: eznet-4
    networks: [hsm-net]
    ports:
      - "9107:9100"
      - "8124:8124"
    volumes:
      - ./config/eznet-4/application.properties:/eznet/config/application.properties:ro
    depends_on:
      artemis-master:
        condition: service_healthy
    restart: unless-stopped

  # ── EZNet-5 (linear-scaling test) ────────────────────────────────────────
  eznet-5:
    image: hsm-eznet:latest
    container_name: eznet-5
    hostname: eznet-5
    networks: [hsm-net]
    ports:
      - "9108:9100"
      - "8125:8125"
    volumes:
      - ./config/eznet-5/application.properties:/eznet/config/application.properties:ro
    depends_on:
      artemis-master:
        condition: service_healthy
    restart: unless-stopped

  # ── EZNet-2 ───────────────────────────────────────────────────────────────
  eznet-2:
    image: hsm-eznet:latest
    container_name: eznet-2
    hostname: eznet-2
    networks: [hsm-net]
    ports:
      - "9101:9100"
      - "8121:8121"
    volumes:
      - ./config/eznet-2/application.properties:/eznet/config/application.properties:ro
      - eznet2-logs:/var/log/xenticate
    depends_on:
      artemis-master:
        condition: service_healthy
    restart: unless-stopped

  # ── Go HSM sim x5 (in-cluster, replaces .NET sims for benchmarking) ───────
  # Each listens on its own port (9000-9004) so they're individually addressable
  # both on the docker network (hsm-sim-N:900X) and on the host (19000-19004).
  hsm-sim-1:
    build: { context: ./hsm-sim, dockerfile: Dockerfile }
    image: hsm-sim:latest
    container_name: hsm-sim-1
    hostname: hsm-sim-1
    networks: [hsm-net]
    ports: ["19000:9000", "19100:9100"]
    environment: { SIM_ID: hsm-sim-1, SIM_LISTEN: ":9000" }
    restart: unless-stopped
  hsm-sim-2:
    image: hsm-sim:latest
    container_name: hsm-sim-2
    hostname: hsm-sim-2
    networks: [hsm-net]
    ports: ["19001:9001", "19101:9100"]
    environment: { SIM_ID: hsm-sim-2, SIM_LISTEN: ":9001" }
    depends_on: [hsm-sim-1]
    restart: unless-stopped
  hsm-sim-3:
    image: hsm-sim:latest
    container_name: hsm-sim-3
    hostname: hsm-sim-3
    networks: [hsm-net]
    ports: ["19002:9002", "19102:9100"]
    environment: { SIM_ID: hsm-sim-3, SIM_LISTEN: ":9002" }
    depends_on: [hsm-sim-1]
    restart: unless-stopped
  hsm-sim-4:
    image: hsm-sim:latest
    container_name: hsm-sim-4
    hostname: hsm-sim-4
    networks: [hsm-net]
    ports: ["19003:9003", "19103:9100"]
    environment: { SIM_ID: hsm-sim-4, SIM_LISTEN: ":9003" }
    depends_on: [hsm-sim-1]
    restart: unless-stopped
  hsm-sim-5:
    image: hsm-sim:latest
    container_name: hsm-sim-5
    hostname: hsm-sim-5
    networks: [hsm-net]
    ports: ["19004:9004", "19104:9100"]
    environment: { SIM_ID: hsm-sim-5, SIM_LISTEN: ":9004" }
    depends_on: [hsm-sim-1]
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    hostname: prometheus
    networks: [hsm-net]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    hostname: grafana
    networks: [hsm-net]
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/hsm-lb.json
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── cAdvisor ───────────────────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    hostname: cadvisor
    networks: [hsm-net]
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
