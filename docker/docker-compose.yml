  # ── Go EZNet-1..5 (Go replacement for Java tcp2jms WAR) ─────────────────
  # Uses AMQP 1.0 on port 61618. Same queue names as Java EZNet.
  # Host ports 9110-9114 (TCP) + 8130-8134 (metrics) to coexist with Java EZNets.
  go-eznet-1:
    build:
      context: ../../../../go-eznet
      dockerfile: Dockerfile
    image: go-eznet:latest
    container_name: go-eznet-1
    hostname: go-eznet-1
    networks: [hsm-net]
    ports:
      - "9110:9100"
      - "8130:8120"
    command:
      - "-tcp-port=9100"
      - "-metrics-port=8120"
      - "-broker=amqp://artemis-master:61618"
      - "-broker2=amqp://artemis-slave:61618"
      - "-self-queue=hsm-transparent-lb-inbound-go-1"
      - "-outbound-queue=hsm.transparent.lb.in"
      - "-max-conn=2000"
      - "-read-timeout=30s"
    depends_on:
      artemis-master:
        condition: service_healthy
    restart: unless-stopped

  go-eznet-2:
    image: go-eznet:latest
    container_name: go-eznet-2
