      - ./prometheus/jmx-artemis.yml:/jmx/config.yml:ro
    environment:
      ARTEMIS_USER: artemis
      ARTEMIS_PASSWORD: artemis
      ANONYMOUS_LOGIN: "true"
      JAVA_ARGS: "-Xms1g -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -javaagent:/jmx/jmx_prometheus_javaagent.jar=9406:/jmx/config.yml"
    mem_limit: 1500m
    memswap_limit: 1500m
    restart: unless-stopped

  # ── Artemis Node4 ────────────────────────────────────────────────────────
  artemis-node4:
    image: apache/activemq-artemis:2.38.0
